<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Agency - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .brand-text { color: #ff3e00; font-style: italic; }
    </style>
</head>
<body>
    <div id="root" class="text-center">
        <h1 class="text-5xl md:text-7xl font-bold">
            Vi bygger <span class="brand-text">framtidens</span> varumärken.
        </h1>
        <p class="text-zinc-400 mt-6 text-xl">NM Agency - Sidan laddas...</p>
        <div id="debug-info" class="mt-10 text-xs text-zinc-600">Väntar på React...</div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        function App() {
            return (
                <div className="p-6">
                    <h1 className="text-5xl md:text-7xl font-bold">
                        Vi bygger <span className="text-[#ff3e00] italic">framtidens</span> varumärken.
                    </h1>
                    <p className="text-zinc-400 mt-6 text-xl">Kopplingen till React fungerar!</p>
                    <a href="mailto:agencymarketingnm@gmail.com" className="mt-8 inline-block bg-[#ff3e00] px-8 py-3 rounded-full font-bold">Kontakta oss</a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        document.getElementById('debug-info').innerText = "React har startat!";
    </script>
</body>
</html>
