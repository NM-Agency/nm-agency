<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { brand: '#ff3e00' } } }
      }
    </script>
    <style>
        body { background-color: #09090b; color: white; margin: 0; font-family: sans-serif; }
        .glass { background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        iframe { pointer-events: none; position: fixed; inset: 0; z-index: -1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Vi skapar en enkel ikon-komponent eftersom Lucide laddas annorlunda här
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            useEffect(() => {
                const h = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);

            return (
                <div className="min-h-screen">
                    {/* SPLINE BAKGRUND */}
                    <iframe src="https://my.spline.design/interfaceii-ySSoYt7OwRMe2FmJroVGNTJQ/" frameBorder="0" width="100%" height="100%"></iframe>
                    
                    {/* NAVBAR */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all ${isScrolled ? 'glass py-4' : 'py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-brand rounded-lg flex items-center justify-center font-bold">NM</div>
                                <span className="text-xl font-bold italic">NM Agency</span>
                            </div>
                            <div className="hidden md:flex gap-8 items-center">
                                <a href="#tjanster" className="text-sm hover:text-brand">Tjänster</a>
                                <a href="#kontakt" className="bg-brand px-6 py-2 rounded-full font-bold">Boka möte</a>
                            </div>
                        </div>
                    </nav>

                    <main>
                        {/* HERO */}
                        <section className="pt-48 pb-20 px-6 text-center">
                            <h1 className="text-6xl md:text-8xl font-bold mb-8 tracking-tighter leading-tight">
                                Vi bygger <span className="text-brand italic">framtidens</span> varumärken.
                            </h1>
                            <p className="text-xl text-zinc-300 mb-10 max-w-2xl mx-auto">
                                NM Agency hjälper ambitiösa företag att dominera sin nisch genom datadriven strategi.
                            </p>
                            <div className="flex justify-center">
                                <a href="#kontakt" className="bg-brand px-10 py-4 rounded-full font-bold text-lg flex items-center gap-2">
                                    Starta ditt projekt <Icon name="arrow-right" />
                                </a>
                            </div>
                        </section>

                        {/* TJÄNSTER */}
                        <section id="tjanster" className="py-32 px-6 max-w-7xl mx-auto">
                            <h2 className="text-4xl font-bold mb-16 text-brand italic">Våra Tjänster</h2>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-zinc-900/60 backdrop-blur-md p-10 rounded-[2.5rem] border border-white/10">
                                    <Icon name="facebook" className="text-brand mb-6 w-8 h-8" />
                                    <h3 className="text-2xl font-bold mb-4">Facebook Annonsering</h3>
                                    <p className="text-zinc-400">Vi maximerar din ROI genom avancerad targeting.</p>
                                </div>
                                <div className="bg-zinc-900/60 backdrop-blur-md p-10 rounded-[2.5rem] border border-white/10">
                                    <Icon name="instagram" className="text-brand mb-6 w-8 h-8" />
                                    <h3 className="text-2xl font-bold mb-4">Instagram Annonsering</h3>
                                    <p className="text-zinc-400">Kreativt innehåll som konverterar följare till kunder.</p>
                                </div>
                            </div>
                        </section>

                        {/* KONTAKT */}
                        <section id="kontakt" className="py-32 px-6 text-center">
                            <h2 className="text-5xl font-bold mb-12 text-brand">Redo att växa?</h2>
                            <div className="text-2xl font-bold space-y-4">
                                <p className="text-brand">agencymarketingnm@gmail.com</p>
                                <p>076 318 81 10</p>
                            </div>
                        </section>
                    </main>

                    <footer className="py-12 text-center text-zinc-600 text-sm border-t border-white/5">
                        © 2026 NM Agency AB
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
