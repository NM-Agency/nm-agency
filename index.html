<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: '#ff3e00', 'brand-light': '#ff6233', 'brand-dark': '#cc3200' }
          }
        }
      }
    </script>
    <style>
        body { background-color: #09090b; color: white; margin: 0; font-family: sans-serif; }
        .glass { background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { background-color: #ff3e00; padding: 1rem 2rem; border-radius: 9999px; font-weight: bold; display: inline-flex; items-center: center; gap: 0.5rem; transition: all 0.2s; }
        .btn-primary:hover { background-color: #cc3200; transform: scale(1.05); }
        iframe { pointer-events: none; position: fixed; inset: 0; z-index: -1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ikon-komponent som fungerar utan externa importer
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const Logo = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff3e00" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8">
                <path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0a2 2 0 0 1 2 2v1H2v-1a2 2 0 0 1 2-2" />
                <path d="M7 17h10" /><path d="M6 13l4-4 4 3 6-6" />
                <path d="M17 3h3v3" />
            </svg>
        );

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            useEffect(() => {
                const h = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);

            return (
                <div className="min-h-screen">
                    <iframe src="https://my.spline.design/interfaceii-ySSoYt7OwRMe2FmJroVGNTJQ/" frameBorder="0" width="100%" height="100%"></iframe>
                    
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all ${isScrolled ? 'glass py-4' : 'py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Logo />
                                <span className="text-xl font-bold">NM <span className="text-brand">Agency</span></span>
                            </div>
                            <div className="hidden md:flex gap-8 items-center font-medium">
                                <a href="#tjanster" className="hover:text-brand transition-colors">Tjänster</a>
                                <a href="#om" className="hover:text-brand transition-colors">Om oss</a>
                                <a href="#kontakt" className="text-brand font-bold">Boka möte</a>
                            </div>
                        </div>
                    </nav>

                    <main>
                        {/* HERO */}
                        <section className="pt-48 pb-20 px-6 text-center max-w-5xl mx-auto">
                            <h1 className="text-6xl md:text-[100px] font-bold leading-[0.9] mb-8 tracking-tighter">
                                Vi bygger <span className="text-brand italic font-light">framtidens</span> varumärken.
                            </h1>
                            <p className="text-xl text-zinc-400 mb-10 max-w-2xl mx-auto leading-relaxed">
                                NM Agency hjälper ambitiösa företag att dominera sin nisch genom datadriven strategi och kreativt innehåll.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                                <a href="#kontakt" className="btn-primary">
                                    Starta ditt projekt <Icon name="arrow-right" />
                                </a>
                                <a href="#tjanster" className="px-8 py-4 rounded-full border border-white/10 bg-white/5 backdrop-blur-md">
                                    Våra tjänster
                                </a>
                            </div>
                        </section>

                        {/* TJÄNSTER */}
                        <section id="tjanster" className="py-32 px-6 max-w-7xl mx-auto">
                            <h2 className="text-5xl font-bold mb-16 text-brand">Våra Tjänster</h2>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-zinc-900/50 backdrop-blur-md p-12 rounded-[2.5rem] border border-white/5">
                                    <Icon name="facebook" className="text-brand w-10 h-10 mb-6" />
                                    <h3 className="text-2xl font-bold mb-4">Facebook Annonsering</h3>
                                    <p className="text-zinc-400">Vi skapar högkonverterande kampanjer som driver försäljning och leads.</p>
                                </div>
                                <div className="bg-zinc-900/50 backdrop-blur-md p-12 rounded-[2.5rem] border border-white/5">
                                    <Icon name="instagram" className="text-brand w-10 h-10 mb-6" />
                                    <h3 className="text-2xl font-bold mb-4">Instagram Annonsering</h3>
                                    <p className="text-zinc-400">Visuell storytelling som fångar din målgrupps uppmärksamhet.</p>
                                </div>
                            </div>
                        </section>

                        {/* KONTAKT */}
                        <section id="kontakt" className="py-32 px-6 max-w-7xl mx-auto border-t border-white/5">
                            <div className="grid lg:grid-cols-2 gap-20">
                                <div>
                                    <h2 className="text-6xl font-bold mb-8 text-brand">Redo att växa?</h2>
                                    <p className="text-xl text-zinc-400 mb-8 font-light">Hör av dig så bokar vi ett möte.</p>
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-4 text-2xl font-bold italic">
                                            <Icon name="mail" className="text-brand" /> agencymarketingnm@gmail.com
                                        </div>
                                        <div className="flex items-center gap-4 text-2xl font-bold italic text-brand">
                                            <Icon name="smartphone" /> 076 318 81 10
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-zinc-900/50 p-10 rounded-[2.5rem] border border-white/5 shadow-2xl">
                                    <form className="space-y-6">
                                        <input className="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-brand" placeholder="Ditt namn" />
                                        <input className="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-brand" placeholder="E-post" />
                                        <textarea className="w-full bg-transparent border-b border-white/20 py-4 outline-none focus:border-brand resize-none" placeholder="Meddelande" rows="3"></textarea>
                                        <button className="w-full text-brand font-bold text-xl py-4 hover:scale-105 transition-transform">Skicka meddelande</button>
                                    </form>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="py-12 border-t border-white/5 text-center text-zinc-600 text-sm italic">
                        © 2026 NM Agency AB
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
