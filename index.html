<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: '#ff3e00',
              'brand-light': '#ff6233',
              'brand-dark': '#cc3200',
            }
          }
        }
      }
    </script>
    <style>
        body { background-color: #09090b; color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(9, 9, 11, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-primary { @apply px-8 py-4 rounded-full bg-brand text-white font-bold flex items-center gap-2 hover:bg-brand-light transition-all active:scale-95; }
        /* Fix för att Spline ska ligga bakom allt */
        .spline-container { position: fixed; inset: 0; z-index: -1; background: #09090b; }
        iframe { pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "framer-motion": "https://esm.sh/framer-motion@11.0.0",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
    </script>

    <script type="text/babel" data-type="module">
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
          ArrowRight, Instagram, Mail, Menu, Smartphone, X, Facebook, ChevronDown 
        } from 'lucide-react';

        const { useState, useEffect } = React;

        const Logo = ({ className = "w-6 h-6" }) => (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0a2 2 0 0 1 2 2v1H2v-1a2 2 0 0 1 2-2" />
            <path d="M7 17h10" /><path d="M6 13l4-4 4 3 6-6" />
            <circle cx="6" cy="13" r="1" fill="currentColor" /><circle cx="10" cy="9" r="1" fill="currentColor" /><circle cx="14" cy="12" r="1" fill="currentColor" />
            <path d="M17 3h3v3" />
          </svg>
        );

        const SplineBackground = () => (
          <div className="spline-container">
            <iframe 
              src="https://my.spline.design/interfaceii-ySSoYt7OwRMe2FmJroVGNTJQ/" 
              frameBorder="0" width="100%" height="100%"
              className="absolute w-[calc(100%+150px)] h-[calc(100%+150px)] -bottom-[75px] -right-[75px] object-cover"
            />
            <div className="absolute inset-0 bg-zinc-950/40" />
          </div>
        );

        const Navbar = () => {
          const [isScrolled, setIsScrolled] = useState(false);
          const [isOpen, setIsOpen] = useState(false);
          useEffect(() => {
            const h = () => setIsScrolled(window.scrollY > 20);
            window.addEventListener('scroll', h);
            return () => window.removeEventListener('scroll', h);
          }, []);

          return (
            <nav className={`fixed top-0 left-0 right-0 z-50 transition-all ${isScrolled ? 'glass py-4' : 'py-6'}`}>
              <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <div className="flex items-center gap-2">
                  <Logo className="text-brand w-8 h-8" />
                  <span className="text-xl font-bold italic">NM <span className="text-brand">Agency</span></span>
                </div>
                <div className="hidden md:flex gap-8 items-center">
                  <a href="#tjanster" className="text-sm font-medium hover:text-brand">Tjänster</a>
                  <a href="#om" className="text-sm font-medium hover:text-brand">Om oss</a>
                  <a href="#kontakt" className="bg-brand px-6 py-2 rounded-full font-bold">Boka möte</a>
                </div>
                <button className="md:hidden" onClick={() => setIsOpen(!isOpen)}>{isOpen ? <X/> : <Menu/>}</button>
              </div>
            </nav>
          );
        };

        const App = () => (
          <div className="min-h-screen">
            <SplineBackground />
            <Navbar />
            
            <main>
              {/* HERO */}
              <section className="pt-48 pb-20 px-6 text-center">
                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} transition={{duration:0.6}}>
                  <h1 className="text-6xl md:text-9xl font-bold mb-8 tracking-tighter">
                    Vi bygger <span className="text-brand italic">framtidens</span> varumärken.
                  </h1>
                  <p className="text-xl text-zinc-300 mb-10 max-w-2xl mx-auto">
                    NM Agency hjälper ambitiösa företag att dominera sin nisch genom datadriven strategi.
                  </p>
                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="#kontakt" className="bg-brand px-8 py-4 rounded-full font-bold flex items-center justify-center gap-2">
                      Starta ditt projekt <ArrowRight className="w-5 h-5" />
                    </a>
                  </div>
                </motion.div>
              </section>

              {/* SERVICES */}
              <section id="tjanster" className="py-32 px-6 max-w-7xl mx-auto">
                <h2 className="text-5xl font-bold mb-16 text-brand">Våra Tjänster</h2>
                <div className="grid md:grid-cols-2 gap-8">
                  <div className="bg-zinc-900/40 backdrop-blur-md p-10 rounded-[2.5rem] border border-white/5">
                    <Facebook className="text-brand mb-6 w-8 h-8" />
                    <h3 className="text-2xl font-bold mb-4">Facebook Annonsering</h3>
                    <p className="text-zinc-400 leading-relaxed">Vi optimerar dina kampanjer för maximal avkastning.</p>
                  </div>
                  <div className="bg-zinc-900/40 backdrop-blur-md p-10 rounded-[2.5rem] border border-white/5">
                    <Instagram className="text-brand mb-6 w-8 h-8" />
                    <h3 className="text-2xl font-bold mb-4">Instagram Annonsering</h3>
                    <p className="text-zinc-400 leading-relaxed">Visuell storytelling som bygger ditt varumärke.</p>
                  </div>
                </div>
              </section>

              {/* KONTAKT */}
              <section id="kontakt" className="py-32 px-6 text-center">
                <h2 className="text-6xl font-bold mb-12 text-brand">Redo att växa?</h2>
                <div className="space-y-6">
                  <div className="flex items-center justify-center gap-4 text-2xl font-bold italic">
                    <Mail className="text-brand" /> agencymarketingnm@gmail.com
                  </div>
                  <div className="flex items-center justify-center gap-4 text-2xl font-bold">
                    <Smartphone className="text-brand" /> 076 318 81 10
                  </div>
                </div>
              </section>
            </main>
          </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
